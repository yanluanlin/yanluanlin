<style>
  :root {
    --yl-purple: #660874;
    --yl-purple-deep: #2a0a35;
    --yl-purple-mid: #4f0b64;
    --yl-purple-soft: #f4edf7;
    --yl-ink: #24132e;
    --yl-muted: #66536d;
    --yl-border: rgba(102, 8, 116, 0.16);
    --yl-gold: #b08a2e;
    --yl-surface: #fbf8fc;
  }

  html {
    scroll-behavior: smooth;
  }

  body {
    background:
      linear-gradient(180deg, #fffbff 0%, var(--yl-surface) 38%, #f7f1f9 100%);
    color: var(--yl-ink);
    letter-spacing: 0;
  }

  body :is(h1, h2, h3, h4) {
    color: var(--yl-purple-deep);
    letter-spacing: 0;
  }

  body a {
    color: var(--yl-purple);
    text-decoration-color: rgba(102, 8, 116, 0.28);
    text-underline-offset: 0.18em;
  }

  body a:hover {
    color: var(--yl-purple-mid);
    text-decoration-color: var(--yl-gold);
  }

  #site-header,
  #site-header nav {
    border-bottom-color: rgba(255, 255, 255, 0.16) !important;
    background:
      linear-gradient(90deg, var(--yl-purple-deep) 0%, var(--yl-purple) 58%, var(--yl-purple-mid) 100%) !important;
    background-color: var(--yl-purple) !important;
    backdrop-filter: blur(18px);
    box-shadow: 0 12px 34px rgba(42, 10, 53, 0.18);
  }

  #site-header a {
    color: #fff7ff !important;
  }

  #site-header a:hover,
  #site-header a[aria-current="page"] {
    color: #f2d27b !important;
  }

  #site-header svg {
    color: #fff7ff !important;
  }

  main > section {
    border-top: 1px solid rgba(102, 8, 116, 0.08);
  }

  main > section:first-of-type {
    border-top: 0;
  }

  main > section:nth-of-type(even) {
    background: rgba(244, 237, 247, 0.62);
  }

  main > section:first-of-type img {
    border-radius: 8px;
    box-shadow: 0 24px 70px rgba(42, 10, 53, 0.16);
  }

  .prose,
  .prose :where(p, li) {
    color: var(--yl-ink);
    line-height: 1.78;
  }

  .prose :where(strong) {
    color: var(--yl-purple-deep);
  }

  .prose :where(hr) {
    border-color: var(--yl-border);
  }

  .prose :where(blockquote) {
    border-left-color: var(--yl-purple);
    color: var(--yl-muted);
  }

  .prose :where(ul > li)::marker,
  .prose :where(ol > li)::marker {
    color: var(--yl-purple);
  }

  .prose,
  .max-w-prose {
    max-width: 108ch !important;
  }

  .container {
    width: min(100% - 2rem, 1360px) !important;
  }

  .max-w-3xl,
  .max-w-4xl {
    max-width: 88rem !important;
  }

  .max-w-5xl,
  .max-w-6xl,
  .max-w-7xl {
    max-width: 96rem !important;
  }

  @media (min-width: 1024px) {
    .lg\:max-w-4xl,
    .lg\:max-w-5xl,
    .lg\:max-w-6xl {
      max-width: 94rem !important;
    }
  }

  @media (min-width: 1280px) {
    .xl\:max-w-6xl,
    .xl\:max-w-7xl {
      max-width: 100rem !important;
    }
  }

  .rounded-lg,
  .rounded-xl,
  .rounded-2xl,
  .rounded-3xl {
    border-radius: 8px !important;
  }

  .shadow,
  .shadow-md,
  .shadow-lg,
  .shadow-xl,
  .shadow-2xl {
    box-shadow: 0 18px 48px rgba(42, 10, 53, 0.12) !important;
  }

  .bg-primary-500,
  .bg-primary-600,
  .from-primary-500,
  .via-primary-600,
  .to-primary-600 {
    background-color: var(--yl-purple) !important;
  }

  .text-primary-500,
  .text-primary-600,
  .hover\:text-primary-600:hover {
    color: var(--yl-purple) !important;
  }

  .border-primary-500,
  .border-primary-600 {
    border-color: var(--yl-purple) !important;
  }

  body :is(a, button)[class*="bg-primary"],
  body :is(a, button)[class*="from-primary"],
  body :is(a, button)[class*="to-primary"],
  body a[href="http://faculty.dess.tsinghua.edu.cn/linyanluan/en/index.htm"][class*="rounded"],
  body a[href="http://faculty.dess.tsinghua.edu.cn/linyanluan/en/index.htm"][class*="inline-flex"] {
    background-color: var(--yl-purple) !important;
    background-image:
      linear-gradient(135deg, var(--yl-purple) 0%, var(--yl-purple-mid) 58%, #7a611d 100%) !important;
    color: #fff7ff !important;
    text-decoration: none !important;
  }

  body :is(a, button)[class*="bg-primary"] svg,
  body :is(a, button)[class*="from-primary"] svg,
  body :is(a, button)[class*="to-primary"] svg,
  body a[href="http://faculty.dess.tsinghua.edu.cn/linyanluan/en/index.htm"][class*="rounded"] svg,
  body a[href="http://faculty.dess.tsinghua.edu.cn/linyanluan/en/index.htm"][class*="inline-flex"] svg {
    color: #fff7ff !important;
    stroke: currentColor !important;
  }

  body :is(a, button)[class*="bg-primary"]:hover,
  body :is(a, button)[class*="from-primary"]:hover,
  body :is(a, button)[class*="to-primary"]:hover,
  body a[href="http://faculty.dess.tsinghua.edu.cn/linyanluan/en/index.htm"][class*="rounded"]:hover,
  body a[href="http://faculty.dess.tsinghua.edu.cn/linyanluan/en/index.htm"][class*="inline-flex"]:hover {
    color: #ffffff !important;
    filter: saturate(1.06) brightness(1.03);
  }

  .yl-member-grid {
    display: grid;
    grid-template-columns: minmax(0, 1fr);
    gap: 1.4rem;
    max-width: 1120px;
    margin-top: 2rem;
    margin-right: auto;
    margin-left: auto;
  }

  .yl-member-card {
    display: grid;
    grid-template-columns: minmax(220px, 0.34fr) minmax(0, 1fr);
    width: 100%;
    overflow: hidden;
    min-height: 310px;
    background: rgba(255, 255, 255, 0.96);
    border: 1px solid var(--yl-border);
    border-radius: 8px;
    box-shadow: 0 18px 48px rgba(42, 10, 53, 0.11);
  }

  .yl-member-photo {
    display: block;
    min-height: 310px;
    background: #e9edf0;
  }

  .yl-member-photo img {
    display: block;
    width: 100%;
    height: 100%;
    min-height: 310px;
    object-fit: cover;
    object-position: 61% 42%;
    border-radius: 0 !important;
    box-shadow: none !important;
  }

  .yl-member-photo--sun img {
    object-position: 50% 32%;
  }

  .yl-member-photo--dong img {
    object-position: 50% 42%;
  }

  .yl-member-card-body {
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: clamp(1.25rem, 3vw, 2rem);
  }

  .yl-member-role,
  .yl-profile-role {
    margin: 0 0 0.5rem;
    color: #7a611d;
    font-size: 0.82rem;
    font-weight: 700;
    letter-spacing: 0;
    text-transform: uppercase;
  }

  .yl-member-card h3 {
    margin: 0 0 0.75rem;
    font-size: clamp(1.45rem, 2vw, 1.9rem);
    line-height: 1.15;
  }

  .yl-member-card h3 a {
    color: var(--yl-purple-deep);
    text-decoration: none;
  }

  .yl-member-card h3 a:hover {
    color: var(--yl-purple);
    text-decoration: underline;
    text-decoration-color: var(--yl-gold);
  }

  .yl-member-card p {
    margin: 0 0 1rem;
    color: var(--yl-ink);
    line-height: 1.65;
  }

  .yl-tag-list {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
    margin-top: 0.25rem;
  }

  .yl-tag-list span {
    display: inline-flex;
    align-items: center;
    min-height: 2rem;
    padding: 0.34rem 0.66rem;
    border: 1px solid rgba(15, 91, 105, 0.16);
    border-radius: 999px;
    background: #edf7f8;
    color: #174c57;
    font-size: 0.84rem;
    font-weight: 650;
    line-height: 1.25;
  }

  .yl-profile-hero {
    display: grid;
    grid-template-columns: minmax(210px, 280px) minmax(0, 1fr);
    gap: clamp(1.15rem, 3vw, 2rem);
    align-items: start;
    margin: 1.5rem 0 2.25rem;
    padding: clamp(1rem, 2.6vw, 1.6rem);
    background: rgba(255, 255, 255, 0.96);
    border: 1px solid var(--yl-border);
    border-radius: 8px;
    box-shadow: 0 18px 48px rgba(42, 10, 53, 0.1);
  }

  .yl-profile-hero img {
    display: block;
    width: 100%;
    aspect-ratio: 4 / 5;
    object-fit: cover;
    object-position: 61% 42%;
    border-radius: 8px;
    box-shadow: none !important;
  }

  .yl-mentor-card {
    display: grid;
    grid-template-columns: minmax(220px, 320px) minmax(0, 1fr);
    gap: clamp(1.25rem, 3vw, 2.25rem);
    align-items: stretch;
    max-width: 1120px;
    margin: 1.25rem auto 0;
    overflow: hidden;
    background: rgba(255, 255, 255, 0.96);
    border: 1px solid var(--yl-border);
    border-radius: 8px;
    box-shadow: 0 18px 48px rgba(42, 10, 53, 0.1);
  }

  .yl-mentor-photo {
    display: block;
    min-height: 360px;
    background: #e9edf0;
  }

  .yl-mentor-photo img {
    display: block;
    width: 100%;
    height: 100%;
    min-height: 360px;
    object-fit: cover;
    object-position: 50% 42%;
    border-radius: 0 !important;
    box-shadow: none !important;
  }

  .yl-mentor-content {
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: clamp(1.35rem, 3vw, 2.2rem);
  }

  .yl-mentor-content h3 {
    margin: 0 0 0.75rem;
    font-size: clamp(1.55rem, 2.1vw, 2rem);
    line-height: 1.15;
  }

  .yl-mentor-content h3 a {
    color: var(--yl-purple-deep);
    text-decoration: none;
  }

  .yl-mentor-content h3 a:hover {
    color: var(--yl-purple);
    text-decoration: underline;
    text-decoration-color: var(--yl-gold);
  }

  .yl-mentor-content p {
    margin: 0 0 1rem;
    color: var(--yl-ink);
    line-height: 1.68;
  }

  .yl-mentor-meta {
    display: flex;
    flex-wrap: wrap;
    gap: 0.55rem;
    margin-top: 0.2rem;
  }

  .yl-mentor-meta span {
    display: inline-flex;
    align-items: center;
    min-height: 2rem;
    padding: 0.36rem 0.68rem;
    border-radius: 999px;
    background: var(--yl-purple-soft);
    color: var(--yl-purple-deep);
    font-size: 0.84rem;
    font-weight: 700;
    line-height: 1.25;
  }

  .yl-profile-affiliation {
    margin: 0 0 1rem;
    color: var(--yl-muted);
    font-size: 1rem;
    font-weight: 650;
    line-height: 1.5;
  }

  .yl-profile-summary {
    margin: 0;
    color: var(--yl-ink);
    font-size: 1rem;
    line-height: 1.68;
  }

  .yl-profile-actions {
    display: flex;
    flex-wrap: wrap;
    gap: 0.75rem;
    margin-top: 1.35rem;
  }

  .yl-profile-actions a {
    display: inline-flex;
    align-items: center;
    min-height: 2.6rem;
    padding: 0.62rem 1rem;
    border-radius: 8px;
    background: var(--yl-purple);
    color: #fff7ff !important;
    font-size: 1rem;
    font-weight: 700;
    text-decoration: none;
    box-shadow: 0 12px 28px rgba(102, 8, 116, 0.2);
  }

  .yl-profile-actions a:hover {
    background: var(--yl-purple-mid);
    color: #ffffff !important;
  }

  .prose .yl-publications-page ~ h3 {
    display: flex;
    align-items: center;
    gap: 0.8rem;
    margin-top: 2.4rem;
    margin-bottom: 1rem;
    color: var(--yl-purple-deep);
    font-size: clamp(1.28rem, 1.8vw, 1.62rem);
  }

  .prose .yl-publications-page ~ h3::after {
    content: "";
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, rgba(102, 8, 116, 0.26), rgba(176, 138, 46, 0));
  }

  .prose .yl-publications-page ~ ol {
    list-style: none;
    counter-reset: pub;
    display: grid;
    gap: 0.78rem;
    padding-left: 0;
    margin: 0 0 1.2rem;
  }

  .prose .yl-publications-page ~ ol > li {
    counter-increment: pub;
    position: relative;
    margin: 0;
    padding: 1rem 1.1rem 1rem 3.45rem;
    background: rgba(255, 255, 255, 0.94);
    border: 1px solid rgba(102, 8, 116, 0.12);
    border-left: 4px solid rgba(176, 138, 46, 0.72);
    border-radius: 8px;
    box-shadow: 0 10px 30px rgba(42, 10, 53, 0.07);
    color: var(--yl-ink);
    line-height: 1.68;
  }

  .prose .yl-publications-page ~ ol > li::before {
    content: counter(pub);
    position: absolute;
    top: 1rem;
    left: 1rem;
    display: grid;
    place-items: center;
    width: 1.65rem;
    height: 1.65rem;
    border-radius: 999px;
    background: #edf7f8;
    color: #174c57;
    font-size: 0.78rem;
    font-weight: 800;
  }

  .prose .yl-publications-page ~ ol > li strong {
    color: var(--yl-purple-deep);
  }

  .prose .yl-publications-page ~ ol > li em {
    color: #39424e;
  }

  @media (max-width: 780px) {
    .yl-member-card,
    .yl-mentor-card,
    .yl-profile-hero {
      grid-template-columns: 1fr;
    }

    .yl-member-photo,
    .yl-member-photo img {
      min-height: 360px;
    }

    .yl-mentor-photo,
    .yl-mentor-photo img {
      min-height: 380px;
    }

    .yl-profile-hero img {
      max-height: 520px;
    }
  }

  @media (max-width: 520px) {
    .yl-member-photo,
    .yl-member-photo img {
      min-height: 300px;
    }

    .yl-mentor-photo,
    .yl-mentor-photo img {
      min-height: 330px;
    }

    .prose .yl-publications-page ~ ol > li {
      padding: 0.95rem 0.95rem 0.95rem 3.1rem;
    }

    .prose .yl-publications-page ~ ol > li::before {
      left: 0.82rem;
    }
  }

  footer {
    background: var(--yl-purple-deep) !important;
    color: #f8f1fa !important;
  }
</style>
